<!DOCTYPE html>
<html>
<head>
  <title>Registration</title>
  <style>
    body { background-color: black; }
    nav { text-align: center; background-color: white; padding: 10px; }
    nav a { margin: 0 15px; text-decoration: none; color: black; font-size: 18px; font-weight: bold; }
    #header { color: bisque; text-align: center; }
    #form-container {
      width: 600px;
      background-color: whitesmoke;
      margin: auto;
      padding: 30px;
      color: black;
      font-size: 18px;
      border-radius: 8px;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
    .form-group input { width: 90%; padding: 6px; font-size: 16px; border-radius: 4px; border: 1px solid #aaa; }
    .error { color: red; font-size: 14px; }
    .select-group { margin: 20px 0; text-align: center; }
    select { padding: 6px; font-size: 16px; margin-left: 10px; }
    input[type="submit"] {
      display: block; margin: 20px auto 0; padding: 10px 30px;
      background-color: #333; color: white; font-size: 18px;
      border: none; border-radius: 6px; cursor: pointer;
    }
    input[type="submit"]:hover { background-color: #555; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">HOME</a>
    <a href="places.html">PLACES</a>
    <a href="discount.html">DISCOUNT</a>
    <a href="menu.html">ITEMS</a>
    <a href="details.html">DETAILS</a>
    <a href="about.html">ABOUT US</a>
  </nav>
  <h1 id="header"><b>FILL THE FORM</b></h1>
  <div id="form-container">
    <form onsubmit="return validform()">
      <div class="form-group">
        <label>ENTER YOUR NAME:</label>
        <input type="text" id="fname">
        <span id="nameerror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR AGE:</label>
        <input type="number" id="fage">
        <span id="ageerror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR DATE OF BIRTH:</label>
        <input type="date" id="fdob">
        <span id="doberror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER NUMBER OF TICKETS:</label>
        <input type="number" id="fnooft">
        <span id="counterror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR AADHAR NUMBER:</label>
        <input type="password" id="adharno">
        <span id="adharnoerror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR CONTACT NUMBER:</label>
        <input type="tel" id="contno">
        <span id="contacterror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR E-MAIL:</label>
        <input type="email" id="email">
        <span id="emailerror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER YOUR STARTING PLACE:</label>
        <input type="text" id="stpl">
        <span id="originerror" class="error"></span>
      </div>
      <div class="form-group">
        <label>ENTER NO OF CO-COMPANIONS:</label>
        <input type="number" id="coco">
        <span id="frndserror" class="error"></span>
      </div>
      <div class="select-group">
        <label>PLACE CODE:</label>
        <select id="pc">
          <option value="1">ONE</option><option value="2">TWO</option>
          <option value="3">THREE</option><option value="4">FOUR</option>
          <option value="5">FIVE</option><option value="6">SIX</option>
        </select>
      </div>
      <div class="select-group">
        <label>TIME PERIOD:</label>
        <select id="per">
          <option value="1">Date 3 to 8</option>
          <option value="2">Date 10 to 15</option>
          <option value="3">Date 18 to 23</option>
        </select>
      </div>
      <div class="select-group">
        <input type="submit" value="GO FOR PAYMENT">
      </div>
    </form>
  </div>
  <script>
    function validform() {
      var fields = ['nameerror','ageerror','doberror','counterror',
                    'adharnoerror','contacterror','emailerror','originerror','frndserror'];
      fields.forEach(id => document.getElementById(id).textContent = "");
      let isValid = true;
      var name    = document.getElementById('fname').value;
      var age     = document.getElementById('fage').value;
      var dob     = document.getElementById('fdob').value;
      var count   = document.getElementById('fnooft').value;
      var adharno = document.getElementById('adharno').value;
      var contact = document.getElementById('contno').value;
      var email   = document.getElementById('email').value;
      var orgin   = document.getElementById('stpl').value;
      var frnds   = document.getElementById('coco').value;
      if (name === "" || !isNaN(name))          { document.getElementById('nameerror').textContent    = "Please enter the name properly.";              isValid = false; }
      if (age === "")                            { document.getElementById('ageerror').textContent     = "Please enter your age properly.";             isValid = false; }
      if (dob === "")                            { document.getElementById('doberror').textContent     = "Please enter your date of birth properly.";   isValid = false; }
      if (count === "" || isNaN(count))          { document.getElementById('counterror').textContent   = "Please enter a valid ticket count.";          isValid = false; }
      if (adharno === "")                        { document.getElementById('adharnoerror').textContent = "Please enter your Aadhar number correctly.";  isValid = false; }
      if (contact === "" || isNaN(contact))      { document.getElementById('contacterror').textContent = "Please enter your contact number correctly."; isValid = false; }
      if (email === "" || !email.includes("@"))  { document.getElementById('emailerror').textContent   = "Please enter a valid email address.";         isValid = false; }
      if (orgin === "")                          { document.getElementById('originerror').textContent  = "Please enter your starting place.";           isValid = false; }
      if (frnds === "")                          { document.getElementById('frndserror').textContent   = "Please enter the number of co-companions.";   isValid = false; }
      if (isValid) alert("Form submitted! Proceeding to payment...");
      return false;
    }
  </script>
</body>
</html>
