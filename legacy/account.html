<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0b18;
      --surface: #171224;
      --text: #f8f4ff;
      --muted: #d9c7ff;
      --accent: #a855f7;
      --accent-strong: #7c3aed;
      --border: rgba(168, 85, 247, 0.35);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
    }
    body[data-theme="light"] {
      color-scheme: light;
      --bg: #f7f1ff;
      --surface: #ffffff;
      --text: #1f132f;
      --muted: #5f4a7e;
      --accent: #7c3aed;
      --accent-strong: #5b21b6;
      --border: rgba(124, 58, 237, 0.35);
      --shadow: 0 12px 28px rgba(124, 58, 237, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    nav div {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      margin: 0 10px;
      opacity: 0.95;
    }
    nav a:hover { opacity: 1; }
    #theme-toggle {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      color: var(--surface);
      font-weight: 700;
    }
    main {
      width: min(100% - 32px, 1080px);
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 16px 40px;
    }
    .panel {
      background: rgba(20, 8, 38, 0.92);
      border: 1px solid rgba(134, 80, 255, 0.22);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.35);
      margin-bottom: 24px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .card {
      padding: 28px;
      border: 1px solid rgba(255, 22, 84, 0.22);
      border-radius: 24px;
      background: rgba(10, 4, 26, 0.95);
      box-shadow: 0 20px 40px rgba(255, 22, 84, 0.12);
    }
    .muted { color: rgba(255,255,255,0.68); }
    label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.82);
      font-size: 0.94rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .auth-card {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .form-section {
      display: none;
    }
    .form-section.active {
      display: block;
    }
    .toggle-link {
      color: #ff5d86;
      font-weight: 700;
      border: none;
      background: transparent;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      margin-left: 4px;
    }
    .form-footer {
      margin-top: 18px;
      color: rgba(255,255,255,0.72);
      font-size: 0.95rem;
    }
    form input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    form input::placeholder {
      color: var(--muted);
    }
    button { cursor: pointer; }
    .primary-btn {
      width: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      color: #f8f4ff;
      border: none;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 18px 28px rgba(124, 58, 237, 0.32);
    }
    .secondary-btn {
      background: transparent;
      color: #a855f7;
      border: 1px solid rgba(168, 85, 247, 0.55);
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 700;
      width: 100%;
      margin-top: 18px;
    }
    h1, h2 { color: #f8f4ff; }
    h2 { margin-bottom: 24px; }
    ul { padding-left: 20px; }
    li { margin-bottom: 8px; }
    .auth-header {
      margin-bottom: 20px;
    }
    .auth-header h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }
    .auth-header p {
      margin: 0;
      color: rgba(255,255,255,0.72);
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      nav { justify-content: center; gap: 10px; }
      nav a { margin: 6px 8px; }
      #theme-toggle { width: 100%; max-width: 180px; }
    }
  </style>
</head>
<body>
  <nav>
    <div>
      <a href="index.html">HOME</a>
      <a href="places.html">PLACES</a>
      <a href="menu.html">ITEMS</a>
      <a href="account.html">ACCOUNT</a>
      <a href="about.html">ABOUT US</a>
    </div>
    <button id="theme-toggle" type="button">☀️ Light</button>
  </nav>
  <main>
    <section class="panel">
      <div class="auth-header">
        <h1>Member Access</h1>
        <p>Sign up or log in to manage your tour plans and account bookings.</p>
      </div>
    </section>
    <section class="panel" id="auth-panel">
      <div class="grid">
        <div class="card auth-card">
          <div class="form-section active" id="signup-section">
            <h2>Sign up</h2>
            <form id="signup-form">
              <label>Name</label>
              <input type="text" id="signup-name" placeholder="Your full name" required>
              <label>Email</label>
              <input type="email" id="signup-email" placeholder="Your email address" required>
              <button class="primary-btn" type="submit">Sign up</button>
            </form>
            <div class="form-footer">
              Already have an account?
              <button class="toggle-link" type="button" id="show-login">Log in</button>
            </div>
          </div>
        </div>

        <div class="card auth-card">
          <div class="form-section active" id="login-section">
            <h2>Login</h2>
            <form id="login-form">
              <label>Name</label>
              <input type="text" id="login-name" placeholder="Enter your name" required>
              <label>Email</label>
              <input type="email" id="login-email" placeholder="Enter your email" required>
              <button class="primary-btn" type="submit">Log in</button>
            </form>
            <div class="form-footer">
              New user?
              <button class="toggle-link" type="button" id="show-signup">Register</button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="panel" id="account-view" style="display:none;">
      <h2>Welcome back</h2>
      <p><strong>Name:</strong> <span id="user-name"></span></p>
      <p><strong>Email:</strong> <span id="user-email"></span></p>
      <button class="secondary-btn" id="logout-btn" type="button">Log out</button>
    </section>
    <section class="panel" id="bookings-panel" style="display:none;">
      <h2>Your bookings</h2>
      <div class="grid">
        <div class="card">
          <h3>Current bookings</h3>
          <ul id="current-bookings"></ul>
        </div>
        <div class="card">
          <h3>Previous bookings</h3>
          <ul id="previous-bookings"></ul>
        </div>
      </div>
    </section>
  </main>
  <script>
    const STORAGE_KEYS = {
      user: 'irah_user',
      theme: 'irah_theme',
      accounts: 'irah_accounts',
      bookings: 'irah_bookings'
    };

    function getStoredUser() {
      const storedUser = sessionStorage.getItem(STORAGE_KEYS.user);
      return storedUser ? JSON.parse(storedUser) : null;
    }

    function saveStoredUser(user) {
      sessionStorage.setItem(STORAGE_KEYS.user, JSON.stringify(user));
    }

    function getAccounts() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.accounts) || '[]');
    }

    function saveAccounts(accounts) {
      localStorage.setItem(STORAGE_KEYS.accounts, JSON.stringify(accounts));
    }

    function getBookings() {
      const stored = localStorage.getItem(STORAGE_KEYS.bookings);
      if (!stored) return {};
      try {
        const parsed = JSON.parse(stored);
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveBookings(bookings) {
      localStorage.setItem(STORAGE_KEYS.bookings, JSON.stringify(bookings));
    }

    function getUserBookings(user) {
      const bookings = getBookings();
      return Array.isArray(bookings[user.email]) ? bookings[user.email] : [];
    }

    function saveUserBookings(user, bookings) {
      const allBookings = getBookings();
      allBookings[user.email] = bookings;
      saveBookings(allBookings);
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem(STORAGE_KEYS.theme, theme);
      document.getElementById('theme-toggle').textContent = theme === 'light' ? '🌙 Dark' : '☀️ Light';
    }

    function renderAccount() {
      const user = getStoredUser();
      const authPanel = document.getElementById('auth-panel');
      const accountView = document.getElementById('account-view');
      const bookingsPanel = document.getElementById('bookings-panel');
      const currentList = document.getElementById('current-bookings');
      const previousList = document.getElementById('previous-bookings');

      const savedTheme = localStorage.getItem(STORAGE_KEYS.theme) || 'dark';
      applyTheme(savedTheme);

      if (!user) {
        authPanel.style.display = 'block';
        accountView.style.display = 'none';
        bookingsPanel.style.display = 'none';
        return;
      }

      authPanel.style.display = 'none';
      accountView.style.display = 'block';
      bookingsPanel.style.display = 'block';
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-email').textContent = user.email;

      const bookings = getUserBookings(user);
      const now = new Date();
      const adjustedBookings = bookings.map(booking => {
        const endDate = booking.endDate ? new Date(booking.endDate) : null;
        if (booking.status === 'Current' && endDate && endDate < now) {
          return { ...booking, status: 'Previous' };
        }
        return booking;
      });
      saveUserBookings(user, adjustedBookings);
      const currentBookings = adjustedBookings.filter(booking => booking.status === 'Current');
      const previousBookings = adjustedBookings.filter(booking => booking.status === 'Previous');

      currentList.innerHTML = currentBookings.length
        ? currentBookings.map(booking => `<li>${booking.plan} — ${booking.totalLabel} — Items: ${booking.items && booking.items.length ? booking.items.join(', ') : 'No food items'}</li>`).join('')
        : '<li>No current booking yet.</li>';

      previousList.innerHTML = previousBookings.length
        ? previousBookings.map(booking => `<li>${booking.plan} — ${booking.totalLabel} — Items: ${booking.items && booking.items.length ? booking.items.join(', ') : 'No food items'}</li>`).join('')
        : '<li>No previous booking yet.</li>';
    }

    document.getElementById('signup-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim().toLowerCase();
      if (!name || !email) {
        alert('Please enter your name and email.');
        return;
      }
      const accounts = getAccounts();
      if (accounts.some(account => account.email.toLowerCase() === email)) {
        alert('This email is already signed up. Please log in.');
        return;
      }
      accounts.push({ name, email });
      saveAccounts(accounts);
      this.reset();
      alert('Account created successfully. Please log in now.');
      document.getElementById('signup-section').classList.remove('active');
      document.getElementById('login-section').classList.add('active');
    });

    document.getElementById('login-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const name = document.getElementById('login-name').value.trim().toLowerCase();
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      if (!name || !email) {
        alert('Please enter your name and email.');
        return;
      }
      const accounts = getAccounts();
      const matchedAccount = accounts.find(account => account.email.toLowerCase() === email && account.name.trim().toLowerCase() === name);
      if (!matchedAccount) {
        alert('Account not found. Please sign up first.');
        return;
      }
      saveStoredUser({ name: matchedAccount.name, email: matchedAccount.email });
      renderAccount();
      const params = new URLSearchParams(window.location.search);
      if (params.get('next') === 'places') {
        window.location.href = 'places.html';
      }
    });

    document.getElementById('show-login').addEventListener('click', function () {
      document.getElementById('signup-section').classList.remove('active');
      document.getElementById('login-section').classList.add('active');
    });

    document.getElementById('show-signup').addEventListener('click', function () {
      document.getElementById('login-section').classList.remove('active');
      document.getElementById('signup-section').classList.add('active');
    });

    document.getElementById('show-signup-inline').addEventListener('click', function () {
      document.getElementById('login-section').classList.remove('active');
      document.getElementById('signup-section').classList.add('active');
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      sessionStorage.removeItem(STORAGE_KEYS.user);
      renderAccount();
    });

    document.getElementById('theme-toggle').addEventListener('click', function () {
      const currentTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme);
    });

    renderAccount();
  </script>
</body>
</html>
