<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0b18;
      --surface: #171224;
      --text: #f8f4ff;
      --muted: #d9c7ff;
      --accent: #a855f7;
      --accent-strong: #7c3aed;
      --border: rgba(168, 85, 247, 0.35);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
    }
    body[data-theme="light"] {
      color-scheme: light;
      --bg: #f7f1ff;
      --surface: #ffffff;
      --text: #1f132f;
      --muted: #5f4a7e;
      --accent: #7c3aed;
      --accent-strong: #5b21b6;
      --border: rgba(124, 58, 237, 0.35);
      --shadow: 0 12px 28px rgba(124, 58, 237, 0.12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    nav { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; background: linear-gradient(90deg, var(--accent-strong), var(--accent)); padding: 12px 16px; box-shadow: var(--shadow); }
    nav a { margin: 0 8px; text-decoration: none; color: var(--surface); font-size: 16px; font-weight: bold; }
    #theme-toggle { border:none; border-radius:999px; padding:8px 12px; cursor:pointer; background:var(--surface); color:var(--accent-strong); font-weight:bold; }
    main { max-width: 1000px; margin: 24px auto; padding: 0 16px 40px; }
    .panel { background: linear-gradient(135deg, var(--surface), var(--bg)); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .muted { color: var(--muted); }
    @media (max-width: 480px) { nav a { display:inline-block; margin:4px 6px; font-size:14px; } }
  </style>
</head>
<body>
  <nav>
    <div>
      <a href="index.html">HOME</a>
      <a href="places.html">PLACES</a>
      <a href="menu.html">ITEMS</a>
      <a href="account.html">ACCOUNT</a>
      <a href="about.html">ABOUT US</a>
    </div>
    <button id="theme-toggle" type="button">☀️ Light</button>
  </nav>
  <main>
    <div class="panel">
      <h1>ACCOUNT</h1>
      <p class="muted">This page now serves as the account area for your bookings and login.</p>
    </div>
  </main>
  <script>
    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('irah_theme', theme);
      document.getElementById('theme-toggle').textContent = theme === 'light' ? '🌙 Dark' : '☀️ Light';
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const nextTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(nextTheme);
    });
    applyTheme(localStorage.getItem('irah_theme') || 'dark');
  </script>
</body>
</html>
