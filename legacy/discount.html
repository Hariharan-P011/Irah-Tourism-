<!DOCTYPE html>
<html>
<head>
  <title>Discount</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0b18;
      --surface: #171224;
      --text: #f8f4ff;
      --muted: #d9c7ff;
      --accent: #a855f7;
      --accent-strong: #7c3aed;
      --border: rgba(168, 85, 247, 0.35);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); margin: 0; font-family: Arial, sans-serif; line-height: 1.6; }
    nav { text-align: center; background: linear-gradient(90deg, var(--accent-strong), var(--accent)); padding: 12px 10px; box-shadow: var(--shadow); }
    nav a { margin: 0 10px; text-decoration: none; color: var(--surface); font-size: 16px; font-weight: bold; }
    .one { text-align: center; margin: 24px 0 10px; }
    #box {
      background: linear-gradient(135deg, var(--surface), var(--bg));
      margin: 30px auto;
      padding: 40px 24px 24px;
      min-height: 450px;
      width: min(100% - 32px, 800px);
      border: 2px solid var(--accent);
      border-radius: 18px;
      box-shadow: var(--shadow);
      font-size: 20px;
    }
    input[type="text"] { padding: 8px; font-size: 16px; width: min(100%, 220px); margin-top: 8px; border: 1px solid var(--border); border-radius: 6px; }
    button, .btn { padding: 8px 20px; font-size: 16px; cursor: pointer; background: linear-gradient(90deg, var(--accent-strong), var(--accent)); color: var(--surface); border: none; border-radius: 6px; margin-top: 10px; text-decoration: none; display: inline-block; }
    #result { font-weight: bold; margin-top: 10px; font-size: 22px; }
    #discount { color: var(--accent); font-size: 22px; font-weight: bold; }
    @media (max-width: 480px) { nav a { display: inline-block; margin: 4px 6px; font-size: 14px; } #box { padding: 24px 16px; font-size: 18px; } #result, #discount { font-size: 18px; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">HOME</a>
    <a href="places.html">PLACES</a>
    <a href="menu.html">ITEMS</a>
    <a href="account.html">ACCOUNT</a>
    <a href="about.html">ABOUT US</a>
  </nav>
  <h1 class="one">GET YOUR DISCOUNT!!</h1><hr>
  <div id="box">
    <p>Before payment, check the discount code.</p>
    <label for="num">ENTER A NUMBER BETWEEN 1 TO 10:</label><br>
    <input type="text" id="num"><br><br>
    <button onclick="check()">Check</button>
    <p id="result">Guess the correct number to get your discount!</p>
    <p id="discount">Your Discount = 0%</p>
    <a class="btn" href="form.html">Continue to payment</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get('return') || 'form.html';
    document.querySelector('.btn').href = returnTo;
    let randomNumber = Math.floor(Math.random() * 10) + 1;
    let currentDiscount = 20;
    localStorage.setItem('irah_discount', 0);
    function check() {
      const userGuess = document.getElementById('num').value;
      const result = document.getElementById('result');
      const discountElement = document.getElementById('discount');
      if (parseInt(randomNumber, 10) === parseInt(userGuess, 10)) {
        result.textContent = "You're right! 🎉";
        result.style.color = 'green';
        discountElement.textContent = `Your Discount = ${currentDiscount}%`;
        localStorage.setItem('irah_discount', currentDiscount);
      } else {
        currentDiscount = Math.max(0, currentDiscount - 2);
        result.textContent = "You're wrong! Try again.";
        result.style.color = 'red';
        discountElement.textContent = `Your Discount = ${currentDiscount}%`;
        localStorage.setItem('irah_discount', currentDiscount);
      }
    }
  </script>
</body>
</html>
